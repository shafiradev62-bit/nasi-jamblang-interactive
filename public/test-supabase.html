<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #3ecf8e; margin-top: 0; }
        .test { margin: 20px 0; padding: 15px; border-left: 4px solid #ccc; background: #f9f9f9; }
        .test.success { border-left-color: #3ecf8e; background: #e8f9f1; }
        .test.error { border-left-color: #e74c3c; background: #fde8e8; }
        .test.loading { border-left-color: #f39c12; background: #fef9e7; }
        button {
            background: #3ecf8e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover { background: #35b87d; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
        }
        .status { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Supabase Connection Test</h1>
        <p>Test your Supabase connection and table setup</p>
        
        <button id="testBtn" onclick="runAllTests()">Run All Tests</button>
        <button onclick="clearResults()">Clear</button>
        
        <div id="results"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://yoxcmbpgdlkrqhzngihb.supabase.co';
        const SUPABASE_KEY = ''; // Will be prompted
        
        let supabase;

        window.runAllTests = async function() {
            const results = document.getElementById('results');
            results.innerHTML = '';
            
            // Get Supabase key
            const key = prompt('Enter your Supabase Anon/Publishable Key:');
            if (!key) {
                addResult('error', '❌ Test cancelled');
                return;
            }

            supabase = createClient(SUPABASE_URL, key);

            // Test 1: Connection
            await testConnection();
            
            // Test 2: Tables exist
            await testTables();
            
            // Test 3: Insert student profile
            await testInsertStudent();
            
            // Test 4: Insert exam session
            await testInsertSession();
            
            // Test 5: Query data
            await testQuery();
        };

        async function testConnection() {
            addResult('loading', '⏳ Testing Supabase connection...');
            
            try {
                const { data, error } = await supabase.from('student_profiles').select('count').limit(1);
                
                if (error) {
                    if (error.code === 'PGRST301') {
                        addResult('success', '✅ Connected to Supabase successfully!', {
                            url: SUPABASE_URL,
                            status: 'Connected'
                        });
                    } else {
                        addResult('error', '❌ Connection failed', error);
                    }
                } else {
                    addResult('success', '✅ Connected to Supabase successfully!', {
                        url: SUPABASE_URL,
                        status: 'Connected'
                    });
                }
            } catch (err) {
                addResult('error', '❌ Connection failed', err.message);
            }
        }

        async function testTables() {
            addResult('loading', '⏳ Checking if tables exist...');
            
            try {
                // Check student_profiles
                const { data: students, error: studentErr } = await supabase
                    .from('student_profiles')
                    .select('*')
                    .limit(1);
                
                // Check exam_sessions
                const { data: sessions, error: sessionErr } = await supabase
                    .from('exam_sessions')
                    .select('*')
                    .limit(1);
                
                const tables = {
                    student_profiles: studentErr ? `❌ Error: ${studentErr.message}` : '✅ Exists',
                    exam_sessions: sessionErr ? `❌ Error: ${sessionErr.message}` : '✅ Exists'
                };
                
                if (studentErr || sessionErr) {
                    addResult('error', '❌ Some tables are missing or have errors', tables);
                    addResult('error', '📝 Run this SQL in Supabase SQL Editor:', 
                        `Check the migrations folder: supabase/migrations/20260404150000_complete_setup.sql`);
                } else {
                    addResult('success', '✅ All tables exist!', tables);
                }
            } catch (err) {
                addResult('error', '❌ Table check failed', err.message);
            }
        }

        async function testInsertStudent() {
            addResult('loading', '⏳ Testing student profile insert...');
            
            try {
                const testStudent = {
                    device_id: 'test-' + Date.now(),
                    name: 'Test Student',
                    class: '12A',
                    school: 'Test School',
                    email: 'test@example.com',
                    contact: '08123456789'
                };
                
                const { data, error } = await supabase
                    .from('student_profiles')
                    .insert(testStudent)
                    .select()
                    .single();
                
                if (error) {
                    addResult('error', '❌ Student insert failed', {
                        error: error.message,
                        code: error.code,
                        hint: error.hint
                    });
                } else {
                    addResult('success', '✅ Student profile inserted successfully!', data);
                    
                    // Clean up
                    await supabase.from('student_profiles').delete().eq('id', data.id);
                }
            } catch (err) {
                addResult('error', '❌ Student insert failed', err.message);
            }
        }

        async function testInsertSession() {
            addResult('loading', '⏳ Testing exam session insert...');
            
            try {
                const testSession = {
                    device_id: 'test-' + Date.now(),
                    unit: 1,
                    answers: { q1: 'A', q2: 'B' },
                    score: 0,
                    total: 5,
                    completed: false
                };
                
                const { data, error } = await supabase
                    .from('exam_sessions')
                    .insert(testSession)
                    .select()
                    .single();
                
                if (error) {
                    addResult('error', '❌ Exam session insert failed', {
                        error: error.message,
                        code: error.code,
                        hint: error.hint
                    });
                } else {
                    addResult('success', '✅ Exam session inserted successfully!', data);
                    
                    // Clean up
                    await supabase.from('exam_sessions').delete().eq('id', data.id);
                }
            } catch (err) {
                addResult('error', '❌ Exam session insert failed', err.message);
            }
        }

        async function testQuery() {
            addResult('loading', '⏳ Testing data query...');
            
            try {
                const { data: students, error: studentErr } = await supabase
                    .from('student_profiles')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);
                
                const { data: sessions, error: sessionErr } = await supabase
                    .from('exam_sessions')
                    .select('*, student_profiles(name, email)')
                    .order('started_at', { ascending: false })
                    .limit(5);
                
                const results = {
                    student_profiles_count: studentErr ? 'Error' : students?.length || 0,
                    exam_sessions_count: sessionErr ? 'Error' : sessions?.length || 0,
                    recent_students: studentErr ? studentErr.message : students,
                    recent_sessions: sessionErr ? sessionErr.message : sessions
                };
                
                if (studentErr || sessionErr) {
                    addResult('error', '❌ Query failed', results);
                } else {
                    addResult('success', `✅ Found ${results.student_profiles_count} students and ${results.exam_sessions_count} sessions`, results);
                }
            } catch (err) {
                addResult('error', '❌ Query failed', err.message);
            }
        }

        function addResult(type, message, data = null) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test ${type}`;
            
            let html = `<div class="status">${message}</div>`;
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            div.innerHTML = html;
            results.appendChild(div);
        }

        window.clearResults = function() {
            document.getElementById('results').innerHTML = '';
        };
    </script>
</body>
</html>
